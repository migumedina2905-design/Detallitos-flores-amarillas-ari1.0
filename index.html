<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña hermosa</title>
    <style>
        :root {
            --space-black: #050505;
            --accent-pink: #ff007f;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--space-black);
            /* EFECTO DE ESTRELLAS */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            animation: stars 100s linear infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        @keyframes stars {
            from { background-position: 0 0, 0 0; }
            to { background-position: 550px 550px, 350px 700px; }
        }

        .header {
            margin-top: 30px;
            font-weight: bold;
            font-size: 1.4rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-pink);
            text-shadow: 0 0 15px var(--accent-pink);
        }

        .main-card {
            background: rgba(255, 255, 255, 0.95);
            width: 88%;
            max-width: 380px;
            border-radius: 25px;
            margin-top: 20px;
            padding: 20px;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.4);
            color: #222;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .video-container {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: black;
            line-height: 0;
        }

        .counter-section {
            margin-top: 20px;
        }

        .counter-title {
            color: #777;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .counter-timer {
            font-weight: 800;
            font-size: 1.1rem;
            color: #000;
        }

        .code-block {
            background: #121212;
            width: 85%;
            max-width: 360px;
            border-radius: 20px;
            margin: 25px 0;
            padding: 18px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            border: 1px solid #333;
        }

        .code-header {
            color: #444;
            text-align: right;
            font-size: 0.7rem;
            margin-bottom: 8px;
            border-bottom: 1px solid #222;
        }

        .code-content { color: #d4d4d4; }
        .keyword { color: #c586c0; }
        .property { color: #9cdcfe; }
        .value { color: #ce9178; }

        #btnMusica {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            border: 1.5px solid var(--accent-pink);
            color: white;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-pink);
        }
    </style>
</head>
<body>

    <audio id="miMusica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <button id="btnMusica" onclick="controlMusica()">🎵</button>

    <div class="header">TU PUCHAMON 🦖 🫀</div>

    <div class="main-card">
        <h3 style="margin: 0 0 15px 0; color: #444; font-size: 1rem;">Flores Amarillas</h3>
        
        <div class="video-container">
            <video width="100%" autoplay loop muted playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>

        <div class="counter-section">
            <div class="counter-title">Mi amor por ti comenzó hace...</div>
            <div id="contador" class="counter-timer">Calculando...</div>
        </div>
    </div>

    <div class="code-block">
        <div class="code-header">style.css</div>
        <div class="code-content">
            <span class="keyword">.Vacio_Espacial</span> {<br>
            &nbsp;&nbsp;<span class="property">background</span>: <span class="value">#000</span>;<br>
            &nbsp;&nbsp;<span class="property">status</span>: <span class="value">"Te Amo"</span>;<br>
            &nbsp;&nbsp;<span class="property">puchamon</span>: <span class="value">active</span>;<br>
            }
        </div>
    </div>

    <script>
        // FECHA DE INICIO: 31 de Octubre de 2024
        const anniversaryDate = new Date(2024, 9, 31, 0, 0, 0);

        function updateCounter() {
            const now = new Date();
            const diff = now - anniversaryDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('contador').innerHTML = 
                `${days} días ${hours}h ${minutes}m ${seconds}s`;
        }
        setInterval(updateCounter, 1000);
        updateCounter();

        function controlMusica() {
            const audio = document.getElementById('miMusica');
            const btn = document.getElementById('btnMusica');
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "⏸️";
            } else {
                audio.pause();
                btn.innerHTML = "🎵";
            }
        }
    </script>
</body>
</html>
