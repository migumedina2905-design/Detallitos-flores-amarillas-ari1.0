<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña hermosa</title>
    <style>
        :root {
            --space-black: #050505;
            --yellow-flower: #ffcc00;
            --accent-pink: #ff007f;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--space-black);
            overflow: hidden; /* Mantiene las flores en su universo */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        /* ANIMACIÓN DE FONDO: ESPACIO Y FLORES */
        .universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1a00 0%, #000 70%);
        }

        .flower {
            position: absolute;
            font-size: 20px;
            filter: drop-shadow(0 0 5px var(--yellow-flower));
            animation: float 15s linear infinite;
            opacity: 0.8;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg) translateX(0); }
            100% { transform: translateY(-10vh) rotate(360deg) translateX(50px); }
        }

        /* TARJETA PRINCIPAL */
        .main-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            width: 85%;
            max-width: 350px;
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.2);
            z-index: 10;
        }

        .header {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--accent-pink);
            text-shadow: 0 0 15px var(--accent-pink);
            margin-bottom: 20px;
        }

        .sunflower-main {
            font-size: 60px;
            margin: 10px 0;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.3) drop-shadow(0 0 20px gold); }
        }

        .counter-timer {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--yellow-flower);
            margin-top: 15px;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        /* BOTÓN DE MÚSICA ESTILO MINIMALISTA */
        #btnMusica {
            position: fixed;
            bottom: 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--yellow-flower);
            color: var(--yellow-flower);
            border-radius: 50px;
            padding: 10px 20px;
            cursor: pointer;
            z-index: 100;
            font-weight: bold;
            transition: 0.3s;
        }

        #btnMusica:hover { background: var(--yellow-flower); color: black; }

    </style>
</head>
<body>

    <div class="universe" id="universe"></div>

    <audio id="miMusica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="header">TU PUCHAMON 🦖 🫀</div>

    <div class="main-card">
        <div class="sunflower-main">🌻</div>
        <div style="font-size: 0.9rem; color: #ccc;">Feliz día de las Flores Amarillas</div>
        <div id="contador" class="counter-timer">Calculando...</div>
        <p style="font-size: 0.8rem; color: #aaa; margin-top: 15px;">"Eres la luz en mi universo"</p>
    </div>

    <button id="btnMusica" onclick="controlMusica()">PONER MÚSICA 🎵</button>

    <script>
        // GENERADOR DE FLORES EN EL ESPACIO
        const universe = document.getElementById('universe');
        const flowerIcons = ['🌻', '✨', '⭐', '💛'];

        for (let i = 0; i < 40; i++) {
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.innerHTML = flowerIcons[Math.floor(Math.random() * flowerIcons.length)];
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.animationDuration = (Math.random() * 10 + 10) + 's';
            flower.style.animationDelay = (Math.random() * 10) + 's';
            flower.style.fontSize = (Math.random() * 20 + 10) + 'px';
            universe.appendChild(flower);
        }

        // CONTADOR (31 de Octubre de 2024)
        const anniversaryDate = new Date(2024, 9, 31, 0, 0, 0);

        function updateCounter() {
            const now = new Date();
            const diff = now - anniversaryDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('contador').innerHTML = 
                `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }
        setInterval(updateCounter, 1000);
        updateCounter();

        function controlMusica() {
            const audio = document.getElementById('miMusica');
            const btn = document.getElementById('btnMusica');
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "PAUSAR MÚSICA ⏸️";
            } else {
                audio.pause();
                btn.innerHTML = "PONER MÚSICA 🎵";
            }
        }
    </script>
</body>
</html>
